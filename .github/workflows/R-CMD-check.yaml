name: R-CMD-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Set up R library path
        run: |
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlibs" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/Rlibs"

      - name: Install package dependencies
        run: |
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE); if (!requireNamespace("remotes", quietly = TRUE, lib.loc = Sys.getenv("R_LIBS_USER"))) install.packages("remotes", lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); remotes::install_deps(dependencies = TRUE, lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); install.packages(c("rmarkdown","testthat","knitr"), lib = Sys.getenv("R_LIBS_USER"))'

      - name: Run R CMD check
        run: |
          # Ensure the per-run R library is used by the check
          export R_LIBS_USER="$RUNNER_TEMP/Rlibs"
          export R_LIBS="$R_LIBS_USER:$R_LIBS"
          Rscript --vanilla -e 'cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n"); cat("libPaths:", paste(.libPaths(), collapse = ";"), "\n")'
          # Make extra sure testthat/rmarkdown are available to the check
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); if (!requireNamespace("testthat", quietly = TRUE)) install.packages("testthat", lib = Sys.getenv("R_LIBS_USER")); if (!requireNamespace("rmarkdown", quietly = TRUE)) install.packages("rmarkdown", lib = Sys.getenv("R_LIBS_USER"))'
          R CMD check --no-manual --as-cran .
