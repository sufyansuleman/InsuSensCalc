name: R-CMD-build

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Set up R library path
        run: |
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlibs" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/Rlibs"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libuv1-dev libxml2-dev libssl-dev libcurl4-openssl-dev

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install build dependencies
        run: |
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); if (!requireNamespace("remotes", quietly = TRUE, lib.loc = Sys.getenv("R_LIBS_USER"))) install.packages("remotes", lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); remotes::install_deps(dependencies = TRUE, lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); install.packages(c("knitr", "rmarkdown"), lib = Sys.getenv("R_LIBS_USER"))'

      - name: Build package tarball
        run: |
          # ensure the per-run library is used during build (vignettes need rmarkdown)
          export R_LIBS_USER="$RUNNER_TEMP/Rlibs"
          export R_LIBS="$R_LIBS_USER:$R_LIBS"
          Rscript --vanilla -e 'cat("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"), "\n"); cat("libPaths:", paste(.libPaths(), collapse = ";"), "\n")'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); if (!requireNamespace("rmarkdown", quietly = TRUE, lib.loc = Sys.getenv("R_LIBS_USER"))) install.packages("rmarkdown", lib = Sys.getenv("R_LIBS_USER"))'
          R CMD build .

      - name: Upload source package artifact
        uses: actions/upload-artifact@v4
        with:
          name: InsuSensCalc-source
          path: InsuSensCalc_*.tar.gz
