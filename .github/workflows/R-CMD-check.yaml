name: R-CMD-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Set up R library path
        run: |
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlibs" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/Rlibs"

      - name: Install package dependencies
        run: |
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE); if (!requireNamespace("remotes", quietly = TRUE, lib.loc = Sys.getenv("R_LIBS_USER"))) install.packages("remotes", lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); remotes::install_deps(dependencies = TRUE, lib = Sys.getenv("R_LIBS_USER"))'
          Rscript --vanilla -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); install.packages(c("rmarkdown","testthat","knitr"), lib = Sys.getenv("R_LIBS_USER"))'

      - name: Run R CMD check
        run: R CMD check --no-manual --as-cran .
